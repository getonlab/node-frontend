steps:
# Bước 1: Build image bằng Cloud Native Buildpacks (giống cấu hình Inline của bạn)
- name: 'gcr.io/k8s-skaffold/pack'
  id: Buildpack
  entrypoint: pack
  args:
    - build
    - 'asia-southeast1-docker.pkg.dev/getonlab/cloud-run-source-deploy/geton-main:$COMMIT_SHA' # Sử dụng thông tin từ substitutions
    - '--builder=gcr.io/buildpacks/builder:latest'
    - '--network=cloudbuild'
    - '--path=.'

# Bước 2: Push image lên Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  id: Push
  args:
    - push
    - 'asia-southeast1-docker.pkg.dev/getonlab/cloud-run-source-deploy/geton-main:$COMMIT_SHA'

# Bước 3: Deploy image lên Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: Deploy
  entrypoint: gcloud
  args:
    - 'run'
    - 'deploy'
    - 'geton-main' # Tên service
    - '--platform=managed'
    - '--image=asia-southeast1-docker.pkg.dev/getonlab/cloud-run-source-deploy/geton-main:$COMMIT_SHA'
    - '--region=asia-southeast1'
    - '--allow-unauthenticated'
    - '--quiet'

# Bước 4: Cập nhật firebase.json để trỏ đến revision mới nhất của Cloud Run
# Sử dụng jq để sửa đổi file JSON.
- name: 'gcr.io/cloud-builders/jq'
  id: UpdateFirebaseConfig
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      # Lấy revision mới nhất từ service 'geton-main'
      LATEST_REVISION=$$(gcloud run services describe geton-main --platform=managed --region=asia-southeast1 --format='value(status.latestReadyRevisionName)')
      # Cập nhật trường 'run.revision' trong firebase.json
      jq --arg rev "$$LATEST_REVISION" '.hosting.rewrites[0].run.revision = $$rev' firebase.json > firebase.json.tmp && mv firebase.json.tmp firebase.json

# Bước 5: Deploy lên Firebase Hosting với cấu hình đã được cập nhật
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'firebase'
  args:
    - 'deploy'
    - '--only'
    - 'hosting'
    - '--project'
    - 'getonlab' # Project ID của bạn

images:
- 'asia-southeast1-docker.pkg.dev/getonlab/cloud-run-source-deploy/geton-main:$COMMIT_SHA'
